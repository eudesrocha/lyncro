services:
  - type: web
    name: lyncro
    runtime: node
    buildCommand: npm install && npm run build:css
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # Price IDs — BRL
      - key: STRIPE_PRICE_PRO_BRL_MONTHLY
        sync: false
      - key: STRIPE_PRICE_PRO_BRL_SEMIANNUAL
        sync: false
      - key: STRIPE_PRICE_PRO_BRL_ANNUAL
        sync: false
      # Price IDs — USD
      - key: STRIPE_PRICE_PRO_USD_MONTHLY
        sync: false
      - key: STRIPE_PRICE_PRO_USD_SEMIANNUAL
        sync: false
      - key: STRIPE_PRICE_PRO_USD_ANNUAL
        sync: false
      # Price IDs — EUR
      - key: STRIPE_PRICE_PRO_EUR_MONTHLY
        sync: false
      - key: STRIPE_PRICE_PRO_EUR_SEMIANNUAL
        sync: false
      - key: STRIPE_PRICE_PRO_EUR_ANNUAL
        sync: false
    healthCheckPath: /api/rooms
