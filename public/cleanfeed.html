<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyncro - Clean Feed</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        #video-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Overlay / Lower Third Animations */
        @keyframes overlay-in {
            from {
                transform: translateX(-50px) scale(0.95);
                opacity: 0;
            }

            to {
                transform: translateX(0) scale(1);
                opacity: 1;
            }
        }

        @keyframes overlay-out {
            from {
                transform: translateX(0) scale(1);
                opacity: 1;
            }

            to {
                transform: translateX(-30px) scale(0.95);
                opacity: 0;
            }
        }

        .overlay-animated-in {
            animation: overlay-in 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .overlay-animated-out {
            animation: overlay-out 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .glass-overlay {
            background: linear-gradient(135deg, rgba(0, 120, 212, 0.95) 0%, rgba(0, 80, 150, 0.95) 100%);
            backdrop-filter: blur(12px);
            border-left: 8px solid #fff;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            padding: 1.5rem 2.5rem;
            display: flex;
            flex-direction: column;
            min-width: 400px;
            color: white;
            border-radius: 0 4px 4px 0;
        }
    </style>
</head>

<body>
    <div id="video-container">
        <video id="remoteVideo" autoplay playsinline muted></video>

        <!-- Lower Third Overlay (Animated) -->
        <div id="lower-third" class="opacity-0 pointer-events-none"
            style="position: absolute; bottom: 4rem; left: 4rem; z-index: 40; opacity: 0;">
            <div class="glass-overlay">
                <span id="ov-display-name"
                    style="font-size: 2.75rem; font-weight: 900; text-transform: uppercase; letter-spacing: -0.02em; line-height: 1.1;">NOME
                    DO CONVIDADO</span>
                <div style="height: 2px; width: 4rem; background: rgba(255,255,255,0.4); margin: 0.75rem 0;"></div>
                <span id="ov-display-title"
                    style="font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.35em; color: rgba(255,255,255,0.85);">CARGO
                    / TAGLINE</span>
            </div>
        </div>

        <div id="status"
            style="position: fixed; top: 20px; left: 20px; color: white; font-family: sans-serif; font-size: 20px; font-weight: bold; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 8px; z-index: 100; display: none;">
        </div>
    </div>

    <!-- O Clean Feed não precisa de UI ou ícones, mantendo-se o mais puro possível para o OBS -->
    <script src="js/config.js"></script>
    <script src="js/webrtc.js"></script>
    <script src="js/cleanfeed.js"></script>
</body>

</html>
