<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <script>
        (function(){var t=localStorage.getItem('lyncro-theme')||(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');document.documentElement.setAttribute('data-theme',t);})();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyncro - Login do Host</title>
    <!-- Google Fonts: Inter e Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/tailwind.css">
    <link rel="stylesheet" href="/css/themes.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script src="js/theme.js"></script>
</head>

<body class="min-h-screen flex items-center justify-center p-6 font-sans">
    <!-- Toggle de Tema (canto superior direito) -->
    <div class="fixed top-4 right-4 z-50">
        <button data-action="toggle-theme" data-theme-icon="dark" title="Alternar tema"
            class="theme-toggle-btn" aria-label="Alternar tema claro/escuro">
            <i class="ph ph-moon"></i>
        </button>
    </div>

    <div class="w-full max-w-md mica-effect p-8 rounded-2xl shadow-2xl animate-reveal">
        <header class="text-center mb-8">
            <h1 class="text-[2.5rem] font-logo font-[600] italic tracking-tight mb-2 leading-none theme-text">Lyncro
            </h1>
            <p class="text-[10px] font-bold text-win-accent tracking-[0.3em] uppercase">HOST LOGIN</p>
        </header>

        <div id="login-form" class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-bold theme-text-secondary uppercase tracking-widest ml-1">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com"
                    class="w-full px-4 py-4 rounded-lg bg-black/40 border border-white/10 border-bottom-2 focus:border-win-accent outline-none transition-all">
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold theme-text-secondary uppercase tracking-widest ml-1">Senha <span
                        class="text-[8px] opacity-50 lowercase">(Opcional para Link Mágico)</span></label>
                <input type="password" id="password" placeholder="••••••••"
                    class="w-full px-4 py-4 rounded-lg bg-black/40 border border-white/10 border-bottom-2 focus:border-win-accent outline-none transition-all">
            </div>

            <div class="flex flex-col gap-3">
                <button onclick="handlePasswordLogin()" id="btn-password"
                    class="w-full bg-win-accent hover:bg-win-accent/90 text-white font-bold py-4 rounded-lg text-xs uppercase tracking-[0.2em] transition-all flex items-center justify-center gap-3 active:scale-95">
                    Entrar com Senha
                </button>

                <button onclick="handleEmailLogin()" id="btn-email"
                    class="w-full bg-white/5 hover:bg-white/10 text-white font-bold py-3 rounded-lg text-[10px] uppercase tracking-[0.1em] transition-all flex items-center justify-center gap-2 active:scale-95 border border-white/5">
                    <i class="ph ph-envelope-simple text-sm"></i> Enviar Link Mágico
                </button>
            </div>

            <div class="relative flex items-center justify-center py-2">
                <div class="w-full border-t border-white/10"></div>
                <span
                    class="absolute px-4 text-[10px] theme-text-secondary font-bold uppercase tracking-widest" style="background:var(--card)">ou</span>
            </div>

            <button onclick="window.LYNCRO_AUTH.loginWithGoogle()"
                class="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white font-bold py-4 rounded-lg text-xs uppercase tracking-[0.2em] transition-all flex items-center justify-center gap-3 active:scale-95">
                <i class="ph ph-google-logo text-lg"></i>
                Entrar com Google
            </button>
        </div>

        <div id="check-email" class="hidden text-center space-y-4 py-6">
            <i class="ph ph-paper-plane-tilt text-5xl text-win-accent animate-bounce"></i>
            <h2 class="font-bold text-xl uppercase tracking-tighter">Verifique seu e-mail</h2>
            <p class="text-sm theme-text-secondary">Enviamos um link de acesso para o seu endereço de e-mail.</p>
            <button onclick="location.reload()"
                class="text-xs text-win-accent font-bold uppercase tracking-widest mt-4">Tentar novamente</button>
        </div>
    </div>

    <script>
        async function handlePasswordLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email || !password) return alert('Insira seu email e senha');

            const btn = document.getElementById('btn-password');
            btn.disabled = true;
            btn.textContent = 'Entrando...';

            try {
                await window.LYNCRO_AUTH.loginWithPassword(email, password);
                // O evento supabase-ready será disparado pelo auth.js se der sucesso
                window.location.href = 'index.html';
            } catch (err) {
                alert('Erro ao fazer login: ' + err.message);
                btn.disabled = false;
                btn.textContent = 'Entrar com Senha';
            }
        }

        async function handleEmailLogin() {
            const email = document.getElementById('email').value.trim();
            if (!email) return alert('Insira seu email');

            const btn = document.getElementById('btn-email');
            btn.disabled = true;
            btn.innerHTML = 'Enviando...';

            try {
                await window.LYNCRO_AUTH.loginWithEmail(email);
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('check-email').classList.remove('hidden');
            } catch (err) {
                alert('Erro ao enviar email: ' + err.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="ph ph-envelope-simple text-sm"></i> Enviar Link Mágico';
            }
        }

        // Se o usuário já estiver logado (ao abrir a página), mandar pro Home
        window.addEventListener('supabase-ready', async (e) => {
            if (e.detail.session) window.location.href = 'index.html';
        });
    </script>
</body>

</html>
