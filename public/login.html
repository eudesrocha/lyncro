<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <script>
        (function () { var t = localStorage.getItem('lyncro-theme') || (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'); document.documentElement.setAttribute('data-theme', t); })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyncro - Login do Host</title>
    <!-- Google Fonts: Inter e Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/tailwind.css">
    <link rel="stylesheet" href="/css/themes.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/toast.js"></script>
</head>
<style>
    .glass-panel {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
    }

    [data-theme="light"] .glass-panel {
        background: rgba(255, 255, 255, 0.6);
        border: 1px solid rgba(0, 0, 0, 0.05);
        box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
    }

    .bg-glow {
        position: relative;
    }

    .bg-glow::before {
        content: '';
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at 50% 0%, rgba(0, 120, 212, 0.12) 0%, transparent 60%);
        z-index: -1;
        pointer-events: none;
    }

    [data-theme="light"] .bg-glow::before {
        background: radial-gradient(circle at 50% 0%, rgba(0, 120, 212, 0.05) 0%, transparent 60%);
    }
</style>
</head>

<body
    class="min-h-screen flex items-center justify-center p-6 font-sans bg-win-bg bg-glow transition-colors duration-300">
    <!-- Toggle de Tema (canto superior direito) -->
    <div class="fixed top-4 right-4 z-50">
        <button data-action="toggle-theme" data-theme-icon="dark" title="Alternar tema" class="theme-toggle-btn"
            aria-label="Alternar tema claro/escuro">
            <i class="ph ph-moon"></i>
        </button>
    </div>

    <div
        class="w-full max-w-md glass-panel p-8 sm:p-10 rounded-3xl shadow-2xl animate-reveal border border-white/10 relative">
        <div class="absolute inset-0 bg-gradient-to-br from-white/5 to-transparent rounded-3xl pointer-events-none">
        </div>
        <header class="text-center mb-8">
            <h1 class="text-[2.5rem] font-logo font-[600] italic tracking-tight mb-2 leading-none theme-text">Lyncro
            </h1>
            <p class="text-[10px] font-bold text-win-accent tracking-[0.3em] uppercase">HOST LOGIN</p>
        </header>

        <div id="login-form" class="space-y-5">
            <div class="space-y-2">
                <label class="text-[10px] font-bold theme-text-secondary uppercase tracking-widest ml-1">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com"
                    class="w-full px-4 py-4 rounded-lg bg-black/40 border border-white/10 focus:border-win-accent outline-none transition-all"
                    onkeydown="if(event.key==='Enter') handleEmailLogin()">
            </div>

            <!-- Erro inline -->
            <div id="login-error" class="hidden flex items-start gap-2.5 px-3.5 py-3 rounded-xl bg-red-500/10 border border-red-500/30 text-red-400 text-[12px] font-medium">
                <i class="ph ph-warning-circle text-base flex-shrink-0 mt-0.5"></i>
                <span id="login-error-msg"></span>
            </div>

            <button onclick="handleEmailLogin()" id="btn-email"
                class="w-full bg-win-accent hover:bg-win-accent/90 text-white font-bold py-4 rounded-xl text-xs uppercase tracking-[0.2em] transition-all flex items-center justify-center gap-3 active:scale-95 shadow-lg">
                <i class="ph ph-envelope-simple text-base"></i>
                Enviar Link de Acesso
            </button>

            <p class="text-center text-[10px] theme-text-secondary leading-relaxed px-2">
                Você receberá um link seguro no seu e-mail para entrar sem precisar de senha.
            </p>

            <div class="relative flex items-center justify-center py-1">
                <div class="w-full border-t border-white/10"></div>
                <span class="absolute px-4 text-[10px] theme-text-secondary font-bold uppercase tracking-widest"
                    style="background:var(--card)">ou</span>
            </div>

            <button onclick="window.LYNCRO_AUTH.loginWithGoogle()"
                class="w-full glass-panel hover:bg-white/10 border-white/20 text-white font-bold py-4 rounded-xl text-xs uppercase tracking-[0.2em] transition-all flex items-center justify-center gap-3 active:scale-95 shadow-xl">
                <i class="ph ph-google-logo text-xl"></i>
                Entrar com Google
            </button>
        </div>

        <div id="check-email" class="hidden text-center space-y-4 py-6">
            <i class="ph ph-paper-plane-tilt text-5xl text-win-accent animate-bounce"></i>
            <h2 class="font-bold text-xl uppercase tracking-tighter">Verifique seu e-mail</h2>
            <p class="text-sm theme-text-secondary">Enviamos um link de acesso para o seu endereço de e-mail.</p>
            <button onclick="location.reload()"
                class="text-xs text-win-accent font-bold uppercase tracking-widest mt-4">Tentar novamente</button>
        </div>
    </div>

    <script>
        function showLoginError(msg) {
            const el  = document.getElementById('login-error');
            const txt = document.getElementById('login-error-msg');
            if (!el || !txt) return;
            txt.textContent = msg;
            el.classList.remove('hidden');
        }
        function clearLoginError() {
            const el = document.getElementById('login-error');
            if (el) el.classList.add('hidden');
        }

        async function handleEmailLogin() {
            clearLoginError();
            const email = document.getElementById('email').value.trim();
            if (!email) return showLoginError('Insira seu endereço de e-mail.');

            const btn = document.getElementById('btn-email');
            btn.disabled = true;
            btn.innerHTML = '<i class="ph ph-circle-notch animate-spin text-base"></i> Enviando...';

            try {
                await window.LYNCRO_AUTH.loginWithEmail(email);
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('check-email').classList.remove('hidden');
            } catch (err) {
                showLoginError('Erro ao enviar e-mail: ' + err.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="ph ph-envelope-simple text-base"></i> Enviar Link de Acesso';
            }
        }

        // Se o usuário já estiver logado (ao abrir a página), mandar pro Home
        window.addEventListener('supabase-ready', async (e) => {
            if (e.detail.session) window.location.href = 'index.html';
        });
    </script>
</body>

</html>
