<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyncro - Host Monitor</title>
    <!-- Tailwind CSS (usando via CDN para simplificar no MVP, mas configurado localmente se necessário) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'win-bg': '#1c1c1c',      // Fundo principal
                        'win-card': '#2b2b2b',    // Cards de vídeo
                        'win-surface': '#323232', // Botões e inputs
                        'win-accent': '#0078d4',  // Azul padrão Windows
                        'win-border': 'rgba(255, 255, 255, 0.08)',
                    },
                    borderRadius: {
                        'win': '4px', // O segredo para não ficar "arredondado demais"
                    }
                }
            }
        }
    </script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="js/config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        .video-label-accent {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 2px;
        }

        .win-btn-hover:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background-color: rgba(255, 255, 255, 0.05);
        }

        .media-muted-overlay {
            background: rgba(0, 0, 0, 0.15);
            /* Opacidade reduzida conforme solicitado */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: 10;
        }

        /* Ajuste para o fundo do dropdown (select options) */
        select,
        select option {
            background-color: #1a1a1a !important;
            color: #efefef !important;
        }

        /* Animação para expansão suave da fila */
        .section-expand {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 1000px;
            opacity: 1;
        }

        .section-collapsed {
            max-height: 0;
            opacity: 0;
            margin-bottom: 0 !important;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
            border: none !important;
            overflow: hidden;
        }
    </style>
</head>

<body class="min-h-screen bg-win-bg text-gray-100 font-sans p-6 selection:bg-win-accent flex flex-col">

    <header class="flex justify-between items-center mb-8 border-b border-win-border/40 pb-5">
        <div class="flex items-baseline gap-5">
            <h1 class="text-4xl font-[900] italic tracking-tight text-white select-none leading-none"
                style="font-family: 'Segoe UI', Tahoma, sans-serif;">Lyncro</h1>
            <span class="text-2xl font-black opacity-30 uppercase tracking-[0.25em] text-win-accent/90">Host
                Monitor</span>
        </div>

        <div class="flex gap-4 items-center">
            <div id="room-id-display"
                class="text-[11px] text-win-accent font-black uppercase tracking-[0.15em] bg-win-accent/10 px-3 py-1.5 rounded-sm border border-win-accent/20 shadow-inner">
            </div>

            <div class="flex items-center gap-1 bg-white/5 border border-win-border p-1 rounded-win">
                <button id="openMobileCam"
                    class="flex items-center gap-2 hover:bg-win-accent hover:text-white px-4 py-1.5 rounded-win transition-all text-[11px] font-bold uppercase tracking-widest text-gray-400 group">
                    <i class="ph ph-camera text-sm text-win-accent group-hover:text-white transition-colors"></i>
                    Lyncro Cam
                </button>
                <div class="w-px h-4 bg-win-border mx-1"></div>
                <button onclick="copyInviteLink()"
                    class="flex items-center gap-2 hover:bg-win-accent hover:text-white px-4 py-1.5 rounded-win transition-all text-[11px] font-bold uppercase tracking-widest text-gray-400 group">
                    <i class="ph ph-link text-sm text-win-accent group-hover:text-white transition-colors"></i>
                    Convidar
                </button>
            </div>

            <div class="flex items-center gap-1 bg-white/5 border border-win-border p-1 rounded-win">
                <div class="flex items-center gap-2 px-2.5 py-1.5 hover:bg-white/5 rounded-win transition-all group">
                    <i class="ph ph-video-camera text-win-accent text-sm opacity-80"></i>
                    <select id="video-device-select"
                        class="bg-transparent border-none text-[10px] font-bold text-gray-400 outline-none w-24 cursor-pointer uppercase tracking-tight focus:text-win-accent transition-colors">
                        <option value="">Câmera</option>
                    </select>
                </div>
                <div class="w-px h-4 bg-win-border mx-1"></div>
                <div class="flex items-center gap-2 px-2.5 py-1.5 hover:bg-white/5 rounded-win transition-all group">
                    <i class="ph ph-microphone text-win-accent text-sm opacity-80"></i>
                    <select id="audio-device-select"
                        class="bg-transparent border-none text-[10px] font-bold text-gray-400 outline-none w-24 cursor-pointer uppercase tracking-tight focus:text-win-accent transition-colors">
                        <option value="">Microfone</option>
                    </select>
                </div>
            </div>

            <div
                class="flex items-center gap-2 bg-white/5 border border-win-border px-3 py-1.5 rounded-win group hover:border-win-accent/40 transition-colors">
                <i class="ph ph-microphone-stage text-win-accent text-lg opacity-80"></i>
                <select id="return-audio-select"
                    class="bg-transparent border-none text-[11px] font-bold text-gray-400 outline-none w-32 cursor-pointer uppercase tracking-tight focus:text-win-accent transition-colors">
                    <option value="">Sem Retorno</option>
                    <!-- Preenchido via JS -->
                </select>
            </div>

            <button onclick="window.location.href='index.html'"
                class="bg-red-600/10 border border-red-500/30 text-red-500 px-6 py-2 rounded-win bg-red-600/5 hover:bg-red-600 hover:text-white transition-all text-[11px] font-black uppercase tracking-[0.2em] shadow-lg shadow-red-900/10">
                Encerrar
            </button>
        </div>
    </header>

    <div class="flex-1 flex gap-4 min-h-0 pl-4 pr-4 pb-4 h-full">
        <main id="video-grid"
            class="flex-1 grid grid-auto-rows-min grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 overflow-y-auto pr-2"
            style="grid-auto-rows: min-content;">
            <!-- O Card do Host (Você) é dinâmico. -->
        </main>

        <!-- Right Side Panel (Split: Fila & Chat) -->
        <aside class="w-80 flex flex-col gap-4 flex-shrink-0 min-h-0">
            <!-- Fila Section -->
            <section id="queue-section"
                class="bg-win-card/40 rounded-win flex flex-col shadow-2xl min-h-0 backdrop-blur-sm section-expand overflow-hidden border border-win-border/20">
                <div class="px-5 py-4 border-b border-win-border/40 flex items-center justify-between bg-white/5">
                    <h2 class="text-[10px] font-bold flex items-center gap-2 uppercase tracking-[0.2em] text-gray-400">
                        <i class="ph ph-users text-win-accent text-sm"></i> Fila de Espera
                    </h2>
                    <span id="queue-count"
                        class="bg-red-600 text-white text-[9px] px-1.5 py-0.5 rounded-sm font-bold hidden">0</span>
                </div>
                <div id="tab-content-queue" class="flex-1 p-4 overflow-y-auto flex flex-col gap-3">
                    <div id="waiting-list" class="flex flex-col gap-2">
                        <!-- Cards de convidados aguardando entram aqui via JS -->
                    </div>
                </div>
            </section>

            <!-- Chat Section -->
            <section
                class="flex-1 bg-win-card/40 rounded-win flex flex-col shadow-2xl min-h-0 backdrop-blur-sm border border-win-border/20">
                <div class="px-5 py-4 border-b border-win-border/40 bg-white/5">
                    <h2 class="text-[10px] font-bold flex items-center gap-2 uppercase tracking-[0.2em] text-gray-400">
                        <i class="ph ph-chat-text text-win-accent text-sm"></i> Chat de Produção
                    </h2>
                </div>
                <div id="tab-content-chat" class="flex-1 flex flex-col overflow-hidden">
                    <div id="chat-messages"
                        class="flex-1 p-4 overflow-y-auto flex flex-col gap-3 text-xs scrollbar-thin">
                        <!-- Mensagens aqui -->
                    </div>
                    <div class="p-3 border-t border-win-border/40 bg-black/20 flex items-center gap-2 shrink-0">
                        <input type="text" id="chat-input" placeholder="Mensagem..."
                            class="flex-1 bg-black/40 border border-win-border/60 rounded px-3 py-2 outline-none focus:border-win-accent transition-colors text-sm placeholder:text-gray-700">
                        <button id="send-chat"
                            class="bg-win-accent text-white w-9 h-9 rounded flex items-center justify-center hover:bg-win-accent/80 transition-all active:scale-95 shadow-lg shadow-win-accent/10">
                            <i class="ph ph-paper-plane-right"></i>
                        </button>
                    </div>
                </div>
            </section>
        </aside>
    </div>

    <!-- Script de Tabs Removido -->

    <!-- Modal QR Code Companion -->
    <div id="qr-modal"
        class="hidden fixed inset-0 z-[110] bg-black/80 backdrop-blur-md flex flex-col items-center justify-center p-6 text-center">
        <div
            class="bg-win-surface border border-win-border rounded-xl p-6 shadow-2xl max-w-sm w-full relative text-gray-100">
            <button id="close-qr-modal" class="absolute top-4 right-4 text-gray-400 hover:text-white transition-colors">
                <i class="ph ph-x text-xl"></i>
            </button>
            <h3 class="text-xl font-bold mb-2">Lyncro Camera</h3>
            <p class="text-xs text-gray-400 mb-6 font-sans">Escaneie o código abaixo com a câmera do seu celular para
                ativá-lo como sua câmera secundária.</p>
            <div class="bg-white p-4 rounded-lg inline-block mb-4">
                <div id="qrcode-container"></div>
            </div>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold font-sans">O celular entrará em modo
                cego automático</p>
        </div>
    </div>

    <script src="js/webrtc.js"></script>
    <script src="js/host.js"></script>
</body>

</html>
