<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyncro - Lobby</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'win-bg': '#1c1c1c',
                        'win-card': '#2b2b2b',
                        'win-surface': '#323232',
                        'win-accent': '#0078d4',
                        'win-border': '#2a2a2a',
                    },
                    borderRadius: { 'win': '4px' }
                }
            }
        }
    </script>
    <style>
        select option {
            background-color: #2b2b2b !important;
            color: #fff !important;
        }

        select:focus {
            border-color: #0078d4 !important;
            outline: none;
        }
    </style>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="js/config.js"></script>
</head>

<body
    class="bg-win-bg text-gray-100 font-sans min-h-screen flex flex-col items-center justify-center p-6 selection:bg-win-accent">

    <div
        class="w-full max-w-sm bg-win-card border border-win-border p-10 rounded-win shadow-[0_20px_50px_rgba(0,0,0,0.5)] backdrop-blur-sm relative overflow-hidden">
        <!-- Detalhe estético de linha no topo -->
        <div
            class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-win-accent/50 to-transparent opacity-50">
        </div>

        <div class="flex flex-col items-center mb-10">
            <h1 class="text-4xl font-[900] italic tracking-tight text-white select-none"
                style="font-family: 'Segoe UI', Tahoma, sans-serif;">Lyncro</h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-[0.3em] font-bold mt-2 opacity-60">Transmissão Remota
            </p>
        </div>

        <form id="lobby-form" class="space-y-6">
            <div class="space-y-1.5">
                <div class="flex justify-between items-end">
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">ID da
                        Sala</label>
                    <button type="button" onclick="copyLink()" title="Copiar link de convite"
                        class="text-[10px] text-win-accent hover:text-white transition-colors flex items-center gap-1 font-bold uppercase tracking-tighter">
                        <i class="ph ph-link"></i> Copiar Link
                    </button>
                </div>
                <input type="text" id="hostRoomId" placeholder="Ex: sala-dos-feras"
                    class="w-full bg-black/30 border border-win-border rounded-win px-4 py-3 text-sm focus:border-win-accent focus:bg-black/50 outline-none transition-all placeholder:text-gray-600">
            </div>

            <div class="space-y-1.5">
                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Senha da Sala
                    (Opcional)</label>
                <input type="password" id="roomPassword" placeholder="••••••••"
                    class="w-full bg-black/30 border border-win-border rounded-win px-4 py-3 text-sm focus:border-win-accent focus:bg-black/50 outline-none transition-all placeholder:text-gray-700">
            </div>

            <div class="space-y-1.5">
                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Seu Nome</label>
                <input type="text" id="userName" placeholder="Nome para o Tally" required
                    class="w-full bg-black/30 border border-win-border rounded-win px-4 py-3 text-sm focus:border-win-accent focus:bg-black/50 outline-none transition-all placeholder:text-gray-600">
            </div>

            <div class="space-y-1.5">
                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Papel na
                    Sessão</label>
                <div class="relative flex items-center">
                    <div class="absolute left-4 pointer-events-none text-win-accent">
                        <i id="role-icon" class="ph ph-user text-sm"></i>
                    </div>
                    <select id="role" onchange="updateRoleIcon(this.value)"
                        class="w-full bg-black/30 border border-win-border rounded-win pl-11 pr-4 py-3 text-sm focus:border-win-accent focus:bg-black/50 outline-none transition-all appearance-none cursor-pointer">
                        <option value="guest">Convidado (Guest)</option>
                        <option value="host">Monitor do Host (Admin)</option>
                    </select>
                    <div class="absolute right-4 pointer-events-none text-gray-500">
                        <i class="ph ph-caret-down"></i>
                    </div>
                </div>
            </div>

            <button type="submit"
                class="w-full bg-win-accent hover:bg-win-accent/80 text-white font-bold py-3.5 rounded-win text-xs uppercase tracking-widest shadow-xl shadow-win-accent/20 transition-all hover:scale-[1.01] active:scale-[0.98] mt-4">
                Entrar na Sessão
            </button>
        </form>
    </div>

    <footer class="mt-12 text-[9px] opacity-20 uppercase tracking-[0.4em] font-medium">
        Powered by Lyncro Core
    </footer>

    <script>
        document.getElementById('lobby-form').onsubmit = async (e) => {
            e.preventDefault();
            const room = document.getElementById('hostRoomId').value.trim();
            const password = document.getElementById('roomPassword').value.trim();
            const name = document.getElementById('userName').value.trim();
            const role = document.getElementById('role').value;

            localStorage.setItem('sv_last_name', name);

            if (role === 'host') {
                // Se for Host, cria a sala na API primeiro
                await createRoom();
            } else {
                // Se for Guest, apenas redireciona
                window.location.href = `guest.html?room=${room}&name=${name}`;
            }
        };

        async function createRoom() {
            const roomId = document.getElementById('hostRoomId').value.trim();
            const password = document.getElementById('roomPassword').value.trim();
            const payload = { name: roomId };
            if (password) payload.password = password;

            try {
                const res = await fetch('/api/rooms', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if (password) {
                    localStorage.setItem(`room_pwd_${data.roomId}`, password);
                }

                window.location.href = `host.html?room=${data.roomId}`;
            } catch (err) {
                console.error('Erro ao criar sala:', err);
                alert('Erro ao criar sala');
            }
        }

        function updateRoleIcon(role) {
            const icon = document.getElementById('role-icon');
            if (role === 'host') {
                icon.className = 'ph ph-monitor-play text-sm';
            } else {
                icon.className = 'ph ph-user text-sm';
            }
        }

        function copyLink() {
            const room = document.getElementById('hostRoomId').value.trim();
            if (!room) {
                alert('Digite o nome da sala primeiro!');
                return;
            }
            const url = `${window.location.origin}/index.html?room=${room}`;
            navigator.clipboard.writeText(url).then(() => {
                alert('Link de convite copiado!');
            });
        }

        // Auto-fill from URL
        const urlParams = new URLSearchParams(window.location.search);
        const prefillRoom = urlParams.get('room');
        if (prefillRoom) document.getElementById('hostRoomId').value = prefillRoom;

        // Auto-fill last name
        const lastName = localStorage.getItem('sv_last_name');
        if (lastName) document.getElementById('userName').value = lastName;
    </script>
</body>

</html>
