<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyncro - Master Grid</title>
    <!-- Usa o Tailwind da main -->
    <link href="css/tailwind.css" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: transparent;
            /* Permite que o OBS coloque cenários por trás se necessário, ou que uma imagem seja configurada */
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #050505;
            /* Fallback limpo */
        }

        /* 
           O grid container se estica até os limites. Usando Flexbox
           com content center, centralizamos automaticamente filas ímpares.
        */
        #grid-container {
            width: 100%;
            height: 100%;
            padding: 16px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            /* centraliza vertical no eixo secundario */
            align-content: center;
            /* centraliza o bloco flex todo no meio */
            justify-content: center;
            /* alinha horizontamente (centraliza os sobressalentes ímpares) */
            gap: 16px;
            /* modern gap */
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        /* Cada célula de vídeo (com proporção FORÇADA para não quebrar a tela) */
        .grid-cell {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            /* Proteções Críticas de Proporção: */
            aspect-ratio: 16 / 9;
            /* Garante Paisagem Independente da Transmissão do Celular */
            max-height: calc(100vh - 32px);
            /* Proíbe estouro vertical (rolagem de tela acidental) */
        }

        .grid-cell video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* preencher conforme o layout pedido (contain por padrão) */
        }

        /* Crachá moderno cinematográfico */
        .name-badge {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 8px 16px;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transform: translateY(10px);
            animation: badge-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.5s;
        }

        @keyframes badge-in {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Status Tally (opcional para gravação?) O OBS gosta limpo, mas talvez seja bom mostrar mudo */
        .mic-off-icon {
            color: #f87171;
            font-size: 16px;
        }

        /* ── INVISÍVEL AO OBS: Controles Flutuantes apenas para host=true ── */
        #host-toolbar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 20, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            border-radius: 9999px;
            display: none;
            /* Só exibido se url ?host=true */
            gap: 16px;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .toolbar-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toolbar-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .loading-glass {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: white;
            font-weight: 600;
            flex-direction: column;
            gap: 16px;
            transition: opacity 0.5s;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #00f0ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Utilitario de áudio (VU escondido no OBS) */
        .vu-ring {
            position: absolute;
            inset: -3px;
            border-radius: 19px;
            border: 3px solid #10b981;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s;
        }

        .speaking .vu-ring {
            opacity: 1;
        }

        /* ── Layout Variations ── */

        /* Transição suave para o container */
        #grid-container {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* CNN Split: 50/50 Side by Side */
        #grid-container.layout-cnn-split {
            gap: 2px;
            padding: 0;
            background: #000;
        }

        #grid-container.layout-cnn-split .grid-cell {
            border-radius: 0;
            border: none;
            box-shadow: none;
            aspect-ratio: auto;
            height: 100vh;
            flex: 1 1 45% !important;
            max-width: 50% !important;
        }

        #grid-container.layout-cnn-split .grid-cell video {
            object-fit: cover !important;
        }

        /* CNN Vertical: enquadramento portrait 9:16 lado a lado */
        #grid-container.layout-cnn-vertical {
            gap: 2px;
            padding: 0;
            background: #000;
            align-items: center;
            align-content: center;
            justify-content: center;
        }

        #grid-container.layout-cnn-vertical .grid-cell {
            border-radius: 0;
            border: none;
            box-shadow: none;
            aspect-ratio: 9/16 !important;
            height: auto !important;
            max-height: 100vh !important;
            /* largura calculada via JS conforme contagem */
        }

        #grid-container.layout-cnn-vertical .grid-cell video {
            object-fit: cover !important;
        }

        /* Portrait Cards: identidade visual Lyncro — dimensões setadas via JS (height-first) */
        #grid-container.layout-portrait-cards {
            gap: 16px;
            padding: 16px;
            align-items: center;
            align-content: center;
            justify-content: center;
        }

        #grid-container.layout-portrait-cards .grid-cell {
            /* JS define width e height explicitamente (height-first para caber todas as linhas) */
            aspect-ratio: unset;
            border-radius: 16px !important;
            border: 1px solid rgba(0, 120, 212, 0.18) !important;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(255, 255, 255, 0.05) !important;
            flex-shrink: 0;
        }

        #grid-container.layout-portrait-cards .grid-cell video {
            object-fit: cover !important;
        }

        /* Speaker Highlight: destaque GRANDE na esquerda + miniaturas na direita */
        #grid-container.layout-speaker-highlight {
            flex-direction: row;
            align-items: flex-start;
            align-content: flex-start;
            justify-content: flex-start;
            padding: 8px;
            gap: 8px;
            background: #050505;
        }

        #grid-container.layout-speaker-highlight .featured-cell {
            flex-shrink: 0;
            border-radius: 12px !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5) !important;
            aspect-ratio: unset !important;
        }

        #grid-container.layout-speaker-highlight .featured-cell video {
            object-fit: cover !important;
        }

        /* Dynamic Cards: JS calcula w/h para preencher a tela sem aspect-ratio fixo */
        #grid-container.layout-dynamic-cards {
            gap: 12px;
            padding: 12px;
            align-items: flex-start;
            align-content: flex-start;
            justify-content: center;
        }

        #grid-container.layout-dynamic-cards .grid-cell {
            aspect-ratio: unset;
            border-radius: 16px !important;
            border: 1px solid rgba(255, 255, 255, 0.06) !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4) !important;
            flex-shrink: 0;
        }

        #grid-container.layout-dynamic-cards .grid-cell video {
            object-fit: cover !important;
        }

        /* ── Waiting Room Overlay ── */
        #waiting-overlay {
            position: fixed;
            inset: 0;
            z-index: 9000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 1s ease;
            overflow: hidden;
        }

        #waiting-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
            background-size: 300% 300%;
        }

        .waiting-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            text-align: center;
            padding: 0 40px;
        }

        .waiting-label {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.45em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.45);
            margin: 0;
        }

        #countdown-timer {
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            font-weight: 900;
            font-size: clamp(72px, 18vw, 200px);
            color: #ffffff;
            text-shadow:
                0 0 30px rgba(0, 120, 212, 1),
                0 0 70px rgba(0, 120, 212, 0.7),
                0 0 120px rgba(0, 120, 212, 0.4);
            letter-spacing: -4px;
            line-height: 1;
            user-select: none;
        }

        .waiting-brand {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.18);
            margin: 0;
        }

        /* Animated gradient backgrounds */
        .waiting-bg-cosmic {
            background: linear-gradient(135deg, #0a0a1a, #0d0d2e, #1a0a2e, #0a1a2e);
            background-size: 400% 400%;
            animation: wr-bg-shift 10s ease infinite;
        }

        .waiting-bg-neon {
            background: linear-gradient(135deg, #000d1a, #001a2e, #002240, #001a2e);
            background-size: 400% 400%;
            animation: wr-bg-shift 8s ease infinite;
        }

        .waiting-bg-aurora {
            background: linear-gradient(135deg, #000d0d, #001a1a, #002222, #0a1a0d);
            background-size: 400% 400%;
            animation: wr-bg-shift 9s ease infinite;
        }

        @keyframes wr-bg-shift {
            0%, 100% { background-position: 0% 50%; }
            50%       { background-position: 100% 50%; }
        }

        /* Blur the grid while waiting room is active */
        #grid-container.wr-active {
            filter: blur(6px);
            transition: filter 1s ease;
        }

        /* Sidebar de miniaturas */
        #speaker-sidebar {
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            overflow: hidden;
            flex-shrink: 0;
        }

        #speaker-sidebar .grid-cell {
            flex-shrink: 0;
            border-radius: 10px !important;
            border: 1px solid rgba(255, 255, 255, 0.06) !important;
            box-shadow: none !important;
            aspect-ratio: unset !important;
        }

        #speaker-sidebar .grid-cell video {
            object-fit: cover !important;
        }
    </style>
</head>

<body>
    <!-- Waiting Room Overlay -->
    <div id="waiting-overlay" style="display:none;opacity:0">
        <div id="waiting-bg" class="waiting-bg-cosmic"></div>
        <div class="waiting-content">
            <p class="waiting-label">Começando em</p>
            <div id="countdown-timer">00:00</div>
            <p class="waiting-brand">LYNCRO</p>
        </div>
    </div>

    <!-- Splash de Conexão -->
    <div id="loading" class="loading-glass">
        <div class="spinner"></div>
        <div class="tracking-widest uppercase text-sm text-gray-400">Sincronizando Mídias...</div>
    </div>

    <!-- O Quadro (Grid) -->
    <div id="grid-container">
        <!-- Javascript vai injetar os .grid-cell aqui -->
    </div>

    <!-- Barra de Controle do Host (invisível por padrão, revelada via JS se houver ?host=true param) -->
    <div id="host-toolbar">
        <div class="text-[11px] font-bold text-gray-400 uppercase tracking-widest mr-2 flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
            Modo Regência (Ao Vivo)
        </div>
        <!-- Opção de Layout/Fundo (poderia ter controles, por enquanto vamos manter clean) -->
        <button class="toolbar-btn" title="Alternar Tela Cheia" onclick="document.documentElement.requestFullscreen()">
            <i class="ph ph-corners-out text-xl"></i>
        </button>
        <button class="toolbar-btn text-red-400" title="Fechar Dashboard" onclick="window.close()">
            <i class="ph ph-x text-xl"></i>
        </button>
    </div>

    <script src="js/config.js"></script>
    <script src="js/webrtc.js"></script>
    <script src="js/grid.js"></script>
</body>

</html>
